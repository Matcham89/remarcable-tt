name: "Terraform Demo"

on:
  pull_request:
    branches: [main]
    paths: ["infra/**"]
  push:
    branches: [main]
    paths: ["infra/**"]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  pull-requests: write

concurrency:
  group: terraform-demo
  cancel-in-progress: false

defaults:
  run:
    working-directory: infra/envs/demo

env:
  TF_VERSION: "1.15.2"
  AWS_REGION: "us-east-1"

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Format check
        run: terraform fmt -check -recursive ../../

      - name: Init without backend
        run: terraform init -backend=false

      - name: Validate
        run: terraform validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      has_changes: ${{ steps.plan.outputs.exitcode == '2' }}

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: arn:aws:iam::342677169881:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Init
        run: terraform init

      - name: Plan
        id: plan
        run: |
          set +e
          terraform plan -detailed-exitcode -out=tfplan -no-color
          exitcode=$?
          echo "exitcode=${exitcode}" >> "$GITHUB_OUTPUT"
          exit "$exitcode"
        continue-on-error: true

      - name: Fail on error
        if: steps.plan.outputs.exitcode == '1'
        run: exit 1

      - uses: actions/upload-artifact@v7
        if: github.event_name != 'pull_request' && steps.plan.outputs.exitcode == '2'
        with:
          name: demo-tfplan
          path: infra/envs/demo/tfplan
          retention-days: 1

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: plan
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      needs.plan.outputs.has_changes == 'true'
    environment: demo

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: arn:aws:iam::342677169881:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - uses: actions/download-artifact@v7
        with:
          name: demo-tfplan
          path: infra/envs/demo

      - name: Init
        run: terraform init

      - name: Apply
        run: terraform apply -auto-approve tfplan
