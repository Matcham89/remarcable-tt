name: "Terraform Destroy Demo"

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type destroy to confirm destroying the demo Terraform stack"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: terraform-demo
  cancel-in-progress: false

defaults:
  run:
    working-directory: infra/envs/demo

env:
  TF_VERSION: "1.15.2"
  AWS_REGION: "us-east-1"

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    if: github.event.inputs.confirm == 'destroy' && github.ref == 'refs/heads/main'
    environment: demo

    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::342677169881:role/github-actions-role
          aws-region: ${{ env.AWS_REGION }}
          role-duration-seconds: 3600

      - name: Init
        run: terraform init

      - name: Destroy
        run: terraform destroy -auto-approve
